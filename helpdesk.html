<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Desk</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-100 min-h-screen flex justify-center items-center" >
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-8">Help Desk.</h1>
        <form id="helpform" class="spacey-y-4">
            <div>
                <label class="block mb-1 font-medium">Fullname</label>
                <input 
                   type="text"
                   id="fullname"
                   class="w-full border rounded-lg p-3"
                   placeholder="John Doe" 
                />
            </div>
            <div>
                <label class="block mb-1 font-medium">Email</label>
                <input 
                   type="text"
                   id="email"
                   class="w-full border rounded-lg p-3"
                   placeholder="johndoe@gmail.com"
                >
            </div>
            <div>
                <label class="block mb-1 font-medium">Issue</label>
                <input 
                   type="text"
                   id="Password"
                   class="w-full border rounded-lg p-3"
                   placeholder="How can we help you."
                >
            </div>
            <button 
              id="submit"
              type="submit"
              class="w-full bg-blue-600 text-white p-3 rounded-lg mt-2  hover:bg-slate-700 transition">Submit</button>
        </form>

        <p 
        id="message"
        class="text-center mt-4 font-medium"></p>

    </div>
    <script src="helpdesk.js"></script>
</body>
</html>
